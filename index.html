<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utility.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Martel+Sans:wght@200;300;400;600;700;800;900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- Include Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="favicon (2).ico" type="image/x-icon">

</head>

<body>
    <!-- <img src="logo.svg" alt="no logo"> -->
    <div class="container1 flex bgBlack">
        <div class="left">
            <img class="invert close" src="img/close.svg" alt="">
            <div class="home bg-grey rounded m1 p1">
                <div class="p2"><img height="55px" class="invert" src="img/logo.svg" alt="logo"></div>
                <ul>
                    <li class="flex"><img class="invert" src="img/home.svg" alt="home">Home</li>
                    <li class="flex"><img class="invert" src="img/search.svg" alt="search">Search</li>
                </ul>
            </div>
            <div class="library bg-grey rounded m1 ">
                <div class="cont1 flex">
                    <div class="smallcont flex">
                        <img class="invert" src="img/playlist.svg" alt="playlist">
                        <h3>Your Library</h3>
                    </div>
                    <img class="invert" src="img/plus.svg" alt="plus">
                </div>
                <div class="songslist">
                    <ul>

                    </ul>
                </div>
                <div class="footer">
                    <div>
                        <a href="https://www.spotify.com/pk-en/legal/" data-encore-id="textLink" id=""> <span
                                data-encore-id="type">Legal</span> </a>
                    </div>
                    <div>
                        <a href="https://www.spotify.com/pk-en/safetyandprivacy/" data-encore-id="textLink" id=""> <span
                                data-encore-id="type">Safety &amp; Privacy Center</span> </a>
                    </div>
                    <div>
                        <a href="https://www.spotify.com/pk-en/legal/privacy-policy/" data-encore-id="textLink" id="">
                            <span data-encore-id="type">Privacy Policy</span>
                        </a>
                    </div>
                    <div>
                        <a href="https://www.spotify.com/pk-en/legal/cookies-policy/" data-encore-id="textLink"
                            id=""><span data-encore-id="type">Cookies</span>
                        </a>
                    </div>
                    <div>
                        <a href="https://www.spotify.com/pk-en/legal/privacy-policy/#s3" data-encore-id="textLink"
                            id="">
                            <span data-encore-id="type">About Ads</span>
                        </a>
                    </div>
                    <div>
                        <a href="https://www.spotify.com/pk-en/accessibility/" data-encore-id="textLink" id=""> <span
                                data-encore-id="type">Accessibility</span>
                        </a>
                    </div>

                    <a draggable="false" href="https://www.spotify.com/legal/cookies-policy/" target="_blank"
                        rel="noopener"><span data-encore-id="text">Cookies</span>
                    </a>
                </div>
            </div>
        </div>
        <div class="right bg-grey rounded  ">
            <div class="header flex">
                <div class="nav">

                    <img class="hamburgur invert" src="img/hamburgur.svg" alt="">

                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M15 6L9.70711 11.2929C9.37377 11.6262 9.20711 11.7929 9.20711 12C9.20711 12.2071 9.37377 12.3738 9.70711 12.7071L15 18"
                            stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M9 18L14.2929 12.7071C14.6262 12.3738 14.7929 12.2071 14.7929 12C14.7929 11.7929 14.6262 11.6262 14.2929 11.2929L9 6"
                            stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <div class="button">
                    <button class="signupBtn">Sign up</button>
                    <button class="loginBtn">Log in</button>
                </div>
            </div>
            <div class="spotifyPlaylist ">
                <h1>Spotify Playlist</h1>
            </div>
            <div class="cardcontainer flex">
                
            </div>
            <div class="playBar flex">
                <div class="seekbar">
                    <div class="circle">

                    </div>
                </div>
                <div class="MusicCont flex">
                    <div class="songInfo">

                    </div>
                    <div class="songButtons flex">
                        <img width="35px" id="previous" src="img/prevsong.svg" alt="">
                        <img width="35px" id="play" src="img/pause.svg" alt="">
                        <img width="35px" id="next" src="img/nextsong.svg" alt="">
                    </div>
                    <div class="songtv flex">
                        <div class="songTime">

                        </div>
                        <div class="volume">
                            <img width="25px" src="img/volume.svg" alt="">
                            <div class="range">
                                <input type="range" name="volume">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
    <script src="scrpt.js"></script>
</body>

</html>
